name: Deploy to Firebase Hosting

on:
  push:
    tags: ["v*"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EDRM_000 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: dapp/yarn.lock

      - name: Install dapp dependencies
        working-directory: dapp
        run: yarn install --frozen-lockfile

      - name: Build dapp
        working-directory: dapp
        env:
          VITE_CHAIN_ID: ${{ secrets.VITE_CHAIN_ID }}
          VITE_STORACHA_KEY: ${{ secrets.VITE_STORACHA_KEY }}
          VITE_STORACHA_PROOF: ${{ secrets.VITE_STORACHA_PROOF }}
        run: yarn build

      - name: Deploy to Firebase Hosting
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: edrm-000
          entryPoint: dapp

      - name: Skip Firebase deploy
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT == '' }}
        run: echo "Skipping Firebase Hosting deploy because FIREBASE_SERVICE_ACCOUNT is not configured."
