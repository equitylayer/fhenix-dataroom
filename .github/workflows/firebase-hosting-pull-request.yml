name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: dapp/yarn.lock
      - name: Install dapp dependencies
        working-directory: dapp
        run: yarn install --frozen-lockfile
      - name: Build dapp
        working-directory: dapp
        env:
          VITE_CHAIN_ID: ${{ secrets.VITE_CHAIN_ID }}
          VITE_STORACHA_KEY: ${{ secrets.VITE_STORACHA_KEY }}
          VITE_STORACHA_PROOF: ${{ secrets.VITE_STORACHA_PROOF }}
        run: yarn build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EDRM_000 }}
          projectId: edrm-000
          entryPoint: dapp
