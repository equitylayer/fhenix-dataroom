      <stop offset="0%" stop-color="#7C6EF6"/>
      <stop offset="50%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#5A4BD1"/>
    </linearGradient>
    <linearGradient id="shine" x1="16" y1="12" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
